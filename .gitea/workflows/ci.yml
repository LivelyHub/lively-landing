name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Typecheck and build
    runs-on: self-hosted
    defaults:
      run:
        working-directory: lively-landing

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lively-landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      # npm sometimes skips rolldown's platform-specific optional dependency
      # (npm/cli#4828); install it explicitly so vite build never hits it.
      - name: Ensure rolldown native binding
        run: node -e "require('rolldown')" || npm install --no-save --force @rolldown/binding-linux-x64-gnu

      - name: Build
        run: npm run build

      - name: Upload the built site
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: lively-landing/dist
          retention-days: 14
